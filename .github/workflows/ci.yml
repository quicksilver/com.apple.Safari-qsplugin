name: build-and-sign

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: n8henrie/qs-plugin-action@master
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}

          QS_PUSH_PLUGIN_USER: ${{ secrets.QS_PUSH_PLUGIN_USER }}
          QS_PUSH_PLUGIN_PASS: ${{ secrets.QS_PUSH_PLUGIN_PASS }}

          TEST_DOES_THIS_SHOW_UP_ANYWHERE: ${{ secrets.TEST_DOES_THIS_SHOW_UP_ANYWHERE }}
